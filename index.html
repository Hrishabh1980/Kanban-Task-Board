<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Project Board</title>
  <!-- Modern typography from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Link external modular CSS stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ==========================================================================
       TOP CONTROL BAR (HEADER)
       ========================================================================== -->
  <header>
    <div class="header-branding">
      <svg class="logo-icon" viewBox="0 0 24 24">
        <path d="M19,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5C21,3.89 20.1,3 19,3M10,17H8V6H10V17M14,13H12V6H14V13M18,10H16V6H18V10Z" />
      </svg>
      <h1 class="header-title">Kanban Task Board</h1>
    </div>

    <div class="header-actions">
      <!-- Search Input -->
      <div class="search-wrapper">
        <label for="board-search" class="sr-only">Search Tasks</label>
        <svg class="search-icon" viewBox="0 0 24 24">
          <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z" />
        </svg>
        <input type="text" id="board-search" class="search-input" placeholder="Search tasks..." aria-label="Search board cards">
        <button id="search-clear-btn" class="search-clear-btn" style="display: none;" title="Clear Search" aria-label="Clear Search">&times;</button>
      </div>

      <!-- Toggle Theme Button -->
      <button id="theme-toggle-btn" class="btn btn-icon-only" title="Toggle Theme Light/Dark" aria-label="Toggle theme">
        <!-- Sun Icon -->
        <svg id="theme-icon-sun" viewBox="0 0 24 24" style="display: none;">
          <path d="M12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,2A1,1 0 0,1 13,3V5A1,1 0 0,1 11,5V3A1,1 0 0,1 12,2M12,19A1,1 0 0,1 13,20V22A1,1 0 0,1 11,22V20A1,1 0 0,1 12,19M2,12A1,1 0 0,1 3,11H5A1,1 0 0,1 5,13H3A1,1 0 0,1 2,12M19,12A1,1 0 0,1 20,11H22A1,1 0 0,1 22,13H20A1,1 0 0,1 19,12M6.27,5.56L7.69,6.97A1,1 0 0,1 7.69,8.39L7.27,8.81A1,1 0 0,1 5.86,8.81L4.44,7.39A1,1 0 0,1 4.44,5.97L4.86,5.56A1,1 0 0,1 6.27,5.56M17.73,17.03L19.14,18.44A1,1 0 0,1 19.14,19.86L18.73,20.27A1,1 0 0,1 17.31,20.27L15.9,18.86A1,1 0 0,1 15.9,17.44L16.31,17.03A1,1 0 0,1 17.73,17.03M5.56,17.73L6.97,16.31A1,1 0 0,1 8.39,16.31L8.81,16.73A1,1 0 0,1 8.81,18.14L7.39,19.56A1,1 0 0,1 5.97,19.56L5.56,19.14A1,1 0 0,1 5.56,17.73M18.44,4.44L19.86,5.86A1,1 0 0,1 19.86,7.27L19.44,7.69A1,1 0 0,1 18.03,7.69L16.61,6.27A1,1 0 0,1 16.61,4.86L17.03,4.44A1,1 0 0,1 18.44,4.44Z" />
        </svg>
        <!-- Moon Icon -->
        <svg id="theme-icon-moon" viewBox="0 0 24 24">
          <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4Z" />
        </svg>
      </button>

      <!-- Add Column Button -->
      <button id="add-column-btn" class="btn btn-primary" title="Create New Kanban Column" aria-label="Add new column">
        <svg viewBox="0 0 24 24">
          <path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" />
        </svg>
        <span>Add Column</span>
      </button>
    </div>
  </header>

  <!-- ==========================================================================
       KANBAN CANVAS
       ========================================================================== -->
  <main class="board-container">
    <div class="board-canvas" id="board-canvas" role="region" aria-label="Kanban board body">
      <!-- Columns are dynamically rendered here -->
    </div>
  </main>

  <!-- ==========================================================================
       CARD EDIT DETAILS MODAL
       ========================================================================== -->
  <div class="modal-overlay" id="card-modal" role="dialog" aria-modal="true" aria-labelledby="card-modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="card-modal-title" class="modal-title">Edit Card Details</h2>
        <button id="card-modal-close" class="modal-close-btn" title="Close modal" aria-label="Close modal">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Hidden Inputs to track card context -->
        <input type="hidden" id="modal-card-id">
        <input type="hidden" id="modal-column-id">

        <!-- Card Title -->
        <div class="form-group">
          <label for="modal-card-title" class="form-label">Task Title</label>
          <textarea id="modal-card-title" class="modal-textarea" placeholder="Enter task title..." required></textarea>
        </div>

        <!-- Priority Label Selector -->
        <div class="form-group">
          <label for="modal-card-priority" class="form-label">Priority Label</label>
          <select id="modal-card-priority" class="modal-select">
            <option value="none">None</option>
            <option value="low">Low Priority</option>
            <option value="medium">Medium Priority</option>
            <option value="high">High Priority</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>

        <!-- Due Date -->
        <div class="form-group">
          <label for="modal-card-duedate" class="form-label">Due Date</label>
          <input type="date" id="modal-card-duedate" class="modal-input">
        </div>
      </div>
      <div class="modal-actions">
        <button id="card-modal-cancel" class="btn">Cancel</button>
        <button id="card-modal-save" class="btn btn-primary">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- ==========================================================================
       CARD ADD DETAILS MODAL
       ========================================================================== -->
  <div class="modal-overlay" id="add-card-modal" role="dialog" aria-modal="true" aria-labelledby="add-card-modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="add-card-modal-title" class="modal-title">Create New Task</h2>
        <button id="add-card-modal-close" class="modal-close-btn" title="Close modal" aria-label="Close modal">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="modal-add-column-id">

        <!-- Card Title -->
        <div class="form-group">
          <label for="modal-add-card-title" class="form-label">Task Title</label>
          <textarea id="modal-add-card-title" class="modal-textarea" placeholder="Enter task title..." required></textarea>
        </div>

        <!-- Priority Label Selector -->
        <div class="form-group">
          <label for="modal-add-card-priority" class="form-label">Priority Label</label>
          <select id="modal-add-card-priority" class="modal-select">
            <option value="none">None</option>
            <option value="low">Low Priority</option>
            <option value="medium" selected>Medium Priority</option>
            <option value="high">High Priority</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>

        <!-- Due Date -->
        <div class="form-group">
          <label for="modal-add-card-duedate" class="form-label">Due Date</label>
          <input type="date" id="modal-add-card-duedate" class="modal-input">
        </div>
      </div>
      <div class="modal-actions">
        <button id="add-card-modal-cancel" class="btn">Cancel</button>
        <button id="add-card-modal-create" class="btn btn-primary">Create Task</button>
      </div>
    </div>
  </div>

  <!-- ==========================================================================
       CUSTOM CONFIRMATION MODAL
       ========================================================================== -->
  <div class="modal-overlay" id="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title">
    <div class="modal-box" style="max-width: 400px;">
      <div class="modal-header">
        <h2 id="confirm-modal-title" class="modal-title">Confirm Action</h2>
        <button id="confirm-modal-close" class="modal-close-btn" title="Close" aria-label="Close Modal">&times;</button>
      </div>
      <div class="modal-body">
        <p class="modal-message" style="font-size: 0.9rem; line-height: 1.5; color: var(--text-secondary);">
          Are you sure you want to perform this action?
        </p>
      </div>
      <div class="modal-actions">
        <button id="confirm-modal-cancel" class="btn cancel-btn">Cancel</button>
        <button id="confirm-modal-ok" class="btn btn-primary confirm-btn" style="background-color: var(--urgent-color); border-color: var(--urgent-color);">Delete</button>
      </div>
    </div>
  </div>

  <!-- ==========================================================================
       TOAST NOTIFICATIONS CONTAINER
       ========================================================================== -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ==========================================================================
       10. DEFERRED INJECTION SCRIPTS
       ========================================================================== -->
  <script src="js/utils.js" defer></script>
  <script src="js/toast.js" defer></script>
  <script src="js/modal.js" defer></script>
  <script src="js/state.js" defer></script>
  <script src="js/dragdrop.js" defer></script>
  <script src="js/render.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
